<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Protego AI</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
    body {
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        min-height: 100vh;
        color: white;
    }

    .glass {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(12px);
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .btn-custom {
        border-radius: 12px;
        font-weight: 500;
    }

    textarea {
        resize: none;
    }

    .title {
        font-weight: 700;
        font-size: 32px;
    }

    .subtitle {
        opacity: 0.7;
    }

    .result-box {
        background: #00000055;
        padding: 15px;
        border-radius: 12px;
        max-height: 300px;
        overflow-y: auto;
    }

    .risk-low { color: #00ffae; }
    .risk-medium { color: #ffc107; }
    .risk-high { color: #ff4d4d; }
    .risk-emergency { color: red; font-weight: bold; }
</style>
</head>

<body>

<div class="container py-5">

    <!-- HEADER -->
    <div class="text-center mb-5">
        <div class="title">🛡️ Protego AI</div>
        <div class="subtitle">Intelligent Safety Detection System</div>
    </div>

    <div class="row g-4">

        <!-- LOGIN -->
        <div class="col-md-4">
            <div class="glass">
                <h5>Login</h5>

                <input id="email" type="email" class="form-control mb-3" placeholder="Email">
                <input id="password" type="password" class="form-control mb-3" placeholder="Password">

                <button class="btn btn-primary w-100 btn-custom" onclick="login()">
                    Login
                </button>

                <div id="loginStatus" class="mt-3 text-success"></div>
            </div>
        </div>

        <!-- ANALYZE -->
        <div class="col-md-8">
            <div class="glass">
                <h5>Analyze Situation</h5>

                <textarea id="text" rows="4" class="form-control mb-3"
                    placeholder="Describe your situation..."></textarea>

                <button class="btn btn-success w-100 btn-custom" onclick="analyze()">
                    Analyze
                </button>

                <div class="mt-4">
                    <h6>Result</h6>
                    <div id="result" class="result-box"></div>
                </div>
            </div>
        </div>

    </div>

</div>

<script>

let token = "";

// LOGIN
async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const res = await fetch("/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({email, password})
    });

    const data = await res.json();

    if (data.access_token) {
        token = data.access_token;
        document.getElementById("loginStatus").innerText = "✅ Logged in";
    } else {
        document.getElementById("loginStatus").innerText = "❌ Login failed";
    }
}

// ANALYZE
async function analyze() {
    const text = document.getElementById("text").value;

    const res = await fetch("/analyze", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({text})
    });

    const data = await res.json();

    // Risk color
    let riskClass = "risk-low";
    if (data.risk_level === "MEDIUM") riskClass = "risk-medium";
    if (data.risk_level === "HIGH") riskClass = "risk-high";
    if (data.risk_level === "EMERGENCY") riskClass = "risk-emergency";

    document.getElementById("result").innerHTML = `
        <b>Emotion:</b> ${data.analysis.emotion} <br>
        <b>Sentiment:</b> ${data.analysis.sentiment} <br>
        <b class="${riskClass}">Risk:</b> ${data.risk_level} <br><br>

        <b>Response:</b><br>
        ${data.response.message} <br>
        <i>${data.response.action}</i>
    `;
}

</script>

</body>
</html>
